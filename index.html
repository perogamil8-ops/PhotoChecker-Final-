<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Quality Checker — فحص جودة الصورة</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!--
    MediaPipe — يتم تحميله بشكل كسول (lazy) بعد ضغط المستخدم على "تحليل"
  -->
  <script>
    // مجرد متغير — التحميل الفعلي في script.js
    window._MP = null;
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◎</span>
        <span class="logo-text">Photo<strong>Check</strong></span>
      </div>
      <p class="header-subtitle">جرب الصوره يباشا </p>
    </div>
  </header>

  <!-- ═══════════════════════════════ MAIN ═══════════════════════════════ -->
  <main class="main-container">

    <!-- ── Upload Zone ── -->
    <section class="upload-section" id="uploadSection">
      <div class="upload-zone" id="dropZone">
        <div class="upload-idle" id="uploadIdle">
          <div class="upload-icon-wrap">
            <svg class="upload-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4"/>
              <path d="M32 42V22M32 22L24 30M32 22L40 30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 46h24" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            </svg>
          </div>
          <h2 class="upload-heading">اسحب صورتك هنا</h2>
          <p class="upload-sub">أو اختر ملفاً من جهازك</p>
          <label class="btn-choose" for="fileInput">
            <span>اختر صورة</span>
          </label>
          <input type="file" id="fileInput" accept="image/*" hidden />
          <p class="upload-hint">PNG، JPG، WEBP — الحد الأدنى 600×600 بكسل</p>
        </div>

        <!-- Preview after selection -->
        <div class="upload-preview hidden" id="uploadPreview">
          <div class="preview-img-wrap">
            <img id="previewImg" src="" alt="معاينة الصورة" />
            <canvas id="overlayCanvas"></canvas>
          </div>
          <div class="preview-meta" id="previewMeta"></div>
          <div class="preview-actions">
            <button class="btn-analyze" id="analyzeBtn">
              <span class="btn-analyze-icon" id="analyzeBtnIcon">▶</span>
              <span id="analyzeBtnText">تحليل الصورة</span>
            </button>
            <button class="btn-reset" id="resetBtn">تغيير الصورة</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Progress Bar ── -->
    <section class="progress-section hidden" id="progressSection">
      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-label" id="progressLabel">جارٍ التحليل…</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-steps" id="progressSteps"></div>
      </div>
    </section>

    <!-- ── Results ── -->
    <section class="results-section hidden" id="resultsSection">

      <!-- Verdict Card -->
      <div class="verdict-card" id="verdictCard">
        <div class="verdict-icon" id="verdictIcon"></div>
        <h2 class="verdict-title" id="verdictTitle"></h2>
        <p class="verdict-sub" id="verdictSub"></p>
        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 120 120">
            <circle class="score-ring-bg" cx="60" cy="60" r="50" />
            <circle class="score-ring-fg" id="scoreRingFg" cx="60" cy="60" r="50" />
          </svg>
          <div class="score-number">
            <span id="scoreValue">0</span>
            <span class="score-denom">/100</span>
          </div>
        </div>
        <p class="score-label">Overall Score</p>
      </div>

      <!-- Checklist -->
      <div class="checklist-card">
        <h3 class="checklist-title">تقرير التحليل التفصيلي</h3>
        <ul class="checklist" id="checklist"></ul>
      </div>

      <!-- Rejection Reasons (shown only if rejected) -->
      <div class="rejection-card hidden" id="rejectionCard">
        <h3 class="rejection-title">أسباب عدم القبول</h3>
        <ul class="rejection-list" id="rejectionList"></ul>
      </div>

      <!-- Retry -->
      <button class="btn-retry" id="retryBtn">تحليل صورة أخرى</button>
    </section>

  </main>

  <!-- ═══════════════════════════════ FOOTER ═══════════════════════════════ -->
  <footer class="site-footer">
    <p>بيرو جميل اللي عامل العظمه دي </p>
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
